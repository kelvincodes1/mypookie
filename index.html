<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To my dearest, Sandra!</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div id="intro" class="intro-screen">
  <h1>Get Ready...</h1>
  <div id="introCount">3</div>
</div>
    <!-- Audio Element -->
    <audio id="bgMusic" loop>
        <!-- Ensure you have a file named 'happy-birthday.mp3' in the same folder -->
        <source src="mj.mp3" type="audio/mpeg">
    </audio>

    <!-- Music Toggle Button -->
    <button class="music-btn" id="musicToggle" aria-label="Toggle Music">
        <svg class="icon-play" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="5 3 19 12 5 21 5 3"></polygon>
        </svg>
        <svg class="icon-pause" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display: none;">
            <rect x="6" y="4" width="4" height="16"></rect>
            <rect x="14" y="4" width="4" height="16"></rect>
        </svg>
    </button>

    <!-- Canvas for Confetti -->
    <canvas id="confettiCanvas"></canvas>

    <div class="floating-hearts" id="heartsContainer"></div>
    <div class="sparkles" id="sparklesContainer"></div>
    
    <main class="container">
        <header class="header">
            <h1 class="title">To my dearest friend, Sandra!</h1>
            <p class="subtitle">From your friend Kelvin — just a small reminder of how much you mean to me.</p>
        </header>

      <section class="gift-section">
    <div class="gift-wrapper" id="giftWrapper">
        
        <div class="gift-box">
            <div class="gift-lid"></div>
            <div class="gift-body"></div>
            <div class="ribbon-vertical"></div>
            <div class="ribbon-horizontal"></div>
        </div>

        <div class="click-hint" id="clickHint">
            <span>Tap to open your gift 🎁</span>
        </div>

    </div>
</section>

        <section class="message-section" id="messageSection">
            <div class="message-card">
                <div class="card-decoration top-left"></div>
                <div class="card-decoration top-right"></div>
                <div class="card-decoration bottom-left"></div>
                <div class="card-decoration bottom-right"></div>
                
                <h2 class="message-title">A Special Message</h2>
                <div id="typewriterContainer">
                    <p class="message-text" id="messageText1"></p>
                    <p class="message-text" id="messageText2"></p>
                </div>
                <p class="signature">With all my love, Kelvin</p>
            </div>
        </section>

        <section class="wish-section">
            <button class="wish-btn" id="wishBtn">Press to receive love</button>
        </section>
<button onclick="secret()">click💗</button>
        <section class="gallery-section">
            <h2 class="gallery-title">Forever mine!</h2>
            <div class="gallery">
                <!-- Magical Photo Frame -->
                <div class="photo-frame">
                    <div class="magic-shine"></div>
                    <!-- Replace 'him.jpg' with your actual image file name -->
                    <img src="her.png" alt="Memory 1" class="photo">
                    <div class="photo-caption">My cute angel!</div>
                </div>
                <!-- Magical Photo Frame -->
                <div class="photo-frame">
                    <div class="magic-shine"></div>
                    <!-- Replace 'him.jpg' with your actual image file name -->
                    <img src="her1.jpg" alt="Memory 2" class="photo">
                    <div class="photo-caption">My beautiful Sandra!</div>
                </div>
            </div>
        </section>

        <footer class="footer">
            <p class="footer-text">Made with love, just for you</p>
            <div class="heart-icon">
                <svg viewBox="0 0 32 32" fill="currentColor">
                    <path d="M16 28.72a3 3 0 0 1-2.13-.88L3.57 17.54a8.72 8.72 0 0 1-2.52-6.25 8.06 8.06 0 0 1 8.14-8A8.06 8.06 0 0 1 16 6.17a8.06 8.06 0 0 1 6.81-2.87 8.06 8.06 0 0 1 8.14 8 8.72 8.72 0 0 1-2.52 6.25l-10.3 10.3a3 3 0 0 1-2.13.88z"/>
                </svg>
            </div>
        </footer>
    </main>

    <script src="script.js"></script>
</body>
</html>
